services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: sentinel-backend:latest
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${HOST_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get('http://127.0.0.1:'+process.env.PORT+'/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(4000,()=>{req.destroy();process.exit(1);});",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  rag:
    build:
      context: .
      dockerfile: Dockerfile
      target: rag
    image: sentinel-rag:latest
    env_file:
      - .env
    environment:
      PORT: 8000
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${RAG_HOST_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      - rag_db
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,sys,urllib.request;port=os.getenv('PORT','8000');url=f'http://127.0.0.1:{port}/health';r=urllib.request.urlopen(url, timeout=4);sys.exit(0 if r.status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  rag_db:
    image: pgvector/pgvector:pg16
    container_name: sentinel-rag-db
    environment:
      POSTGRES_DB: ${RAG_DB_NAME}
      POSTGRES_USER: ${RAG_DB_USER}
      POSTGRES_PASSWORD: ${RAG_DB_PASSWORD}
    volumes:
      - rag_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_DB_USER} -d ${RAG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rag_db_data:
